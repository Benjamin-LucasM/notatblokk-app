<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8" />
    <title>Notatapp</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <h1>Min Notatapp</h1>
    <form id="noteForm">
        <input type="text" id="title" placeholder="Tittel" required />
        <textarea id="content" placeholder="Skriv inn notatet..." required></textarea>
        <button type="submit">Legg til notat</button>
    </form>
    <hr />
    <div id="notesContainer"></div>

    <script src="script.js"></script>
</body>
</html>
