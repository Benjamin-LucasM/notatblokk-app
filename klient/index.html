<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <title>Notatapp</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Min Notatapp</h1>
    <div class="main">
        <div class="notater">
            <h2>Notater</h2>
            <form id="noteForm" class="box">
                <input type="text" id="title" placeholder="Tittel" required />
                <input id="content" placeholder="Skriv inn notatet..." required></input>
                <button type="submit">Legg til notat</button>
            </form>
            <button id="fetchNotesBtn">Hent notater</button>
            <hr />
            <div id="notesContainer"></div>
        </div>
        <div class="todos">
            <h2>Todo Liste</h2>
            <form id="todoForm" class="box">
                <input type="text" id="todoTitle" placeholder="Tittel" required />
                <br>
                <input type="text" id="todoContent" placeholder="Beskrivelse" />
                <button type="button" id="addDescriptionBtn">Legg til beskrivelse</button>
                <div id="descriptionList"></div>
                <br>
                <button type="submit">Lagre todo</button>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
